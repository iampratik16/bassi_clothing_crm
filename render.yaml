# Render Blueprint — Bassi Clothing AI Marketing CRM
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bassi-crm
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: DASHBOARD_HOST
        value: "0.0.0.0"
      - key: DASHBOARD_PORT
        value: "10000"
      - key: MAX_EMAILS_PER_DAY
        value: "100"
      - key: EMAIL_DELAY_SECONDS
        value: "5"
      - key: DRY_RUN
        value: "false"
      - key: SECRET_KEY
        generateValue: true
