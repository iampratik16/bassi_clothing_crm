# ============================================================
# Bassi Clothing — Company Configuration
# B2B Garment Manufacturing & Export → UK/EU
# ============================================================

company:
  name: "Bassi Clothing"
  industry: "B2B Garment Manufacturing & Export"
  target_market: "UK and European Fashion Retailers"
  website: "https://bassiclothing.com"
  tagline: "Premium Garment Manufacturing for European Fashion"

ideal_customer_profile:
  company_types:
    - "Fashion Retailers"
    - "Clothing Brands"
    - "Department Stores"
    - "E-commerce Fashion Platforms"
    - "Private Label Brands"
    - "Sustainable Fashion Startups"

  locations:
    - "United Kingdom"
    - "France"
    - "Germany"
    - "Netherlands"
    - "Italy"
    - "Spain"
    - "Sweden"
    - "Denmark"
    - "Belgium"
    - "Ireland"
#Add all the Euro Country
  decision_makers:
    - "Head of Sourcing"
    - "Procurement Director"
    - "Buying Manager"
    - "Supply Chain Manager"
    - "Head of Purchasing"
    - "CEO"
    - "Managing Director"
    - "Operations Director"
    - "Head of Operations"
#Head of Design
  company_size:
    min_employees: 50 #Make it 1 
    max_employees: 10000

  scoring_weights:
    company_size: 0.20
    industry_match: 0.25
    location_match: 0.25
    engagement: 0.30

value_proposition:
  main_message: "Premium quality garment manufacturing with reliable EU/UK delivery"

  key_benefits:
    - "MOQ flexibility for emerging brands (as low as 300 pieces)"
    - "90-100 day production turnaround with consistent quality"
    - "SEDEX 4 Pillar certified factory audited by SETMA"
    - "Zedd silver certification — ethical and compliant manufacturing"
    - "Competitive pricing — direct manufacturer, no middlemen"
    - "Dedicated account manager for each client"

  differentiators:
    - "Direct manufacturer — zero middlemen markup"
    - "Full compliance with UK/EU quality standards"
    - "Established export infrastructure to Europe"
    - "Samples delivered within 7 business days"
    - "Free initial design consultation"
    - "Transparent pricing with no hidden costs"

  pain_points_addressed:
    - "Unreliable Far East suppliers with 6-8 week lead times vs our structured 90-100 day production"
    - "Quality inconsistency across production batches"
    - "High MOQs that block emerging brands (other: 1000+, us: 300)"
    - "Lack of certified ethical manufacturing (we are SEDEX 4 Pillar & Zedd silver certified)"
    - "Complicated import logistics and customs delays"
    - "Poor communication with overseas factories"

