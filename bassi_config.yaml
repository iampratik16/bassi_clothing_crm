email_templates:
  cold_outreach:
    subject_lines:
      - "{{company_name}} × Bassi — Reliable Garment Manufacturing for the UK Market"
      - "Quality {{product_category}} Manufacturing — Direct to {{country}}"
      - "Quick Q: Sourcing Challenges for Your {{season}} Collection?"
      - "{{company_name}} — Could Your Supply Chain Use a Backup?"
      - "MOQ 300, 20-Day Delivery to {{country}} — Is That Interesting?"

    body_structure:
      - "Brief personalized intro (reference their brand/recent launch)"
      - "Specific pain point (long lead times / quality issues / MOQ too high)"
      - "Our solution (fast, flexible, quality-focused)"
      - "Social proof (similar brands we work with)"
      - "Low-friction CTA (samples, catalog, 15-min call)"

  follow_up:
    cadence:
      - day: 1
        type: "Initial outreach"
      - day: 4
        type: "Case study / portfolio share"
      - day: 8
        type: "Specific offer (free samples)"
      - day: 14
        type: "Breakup email (permission to close file)"

content_guidelines:
  tone: "Professional but approachable, not pushy"
  max_word_count: 400
  avoid:
    - "Generic mass email language"
    - "Hard selling or pressure tactics"
    - "Too much technical jargon"
    - "Mentioning competitors by name"

  include:
    - "Specific numbers (MOQ, lead times, pricing ranges)"
    - "Social proof (brands served, certifications)"
    - "Clear, low-pressure next step"
    - "Personal touch (reference their brand specifically)"

seasonal_outreach:
  spring_summer:
    outreach_months: ["October", "November", "December"]
    focus: "Lightweight fabrics, casual wear, activewear"
  fall_winter:
    outreach_months: ["April", "May", "June"]
    focus: "Hoodies, sweatshirts, denim, outerwear"
  note: "Buyers plan 6-9 months ahead"

gdpr_compliance:
  basis: "Legitimate interest (B2B prospecting)"
  requirements:
    - "Only email business contacts (not personal addresses)"
    - "Include unsubscribe link in every email"
    - "Honor opt-outs within 24 hours"
    - "Don't buy email lists"
    - "Store opt-outs permanently"
    - "Include company contact details in footer"
